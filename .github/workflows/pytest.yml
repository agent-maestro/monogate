name: pytest

on:
  push:
    branches: [master, main]
    paths:
      - "python/**"
      - ".github/workflows/pytest.yml"
  pull_request:
    paths:
      - "python/**"
      - ".github/workflows/pytest.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        env:
          # Provide BEST routing publicly in CI. The same dispatch table is
          # documented in the SuperBEST paper section; the private _routing.pkl
          # is only excluded to keep the build pipeline private, not the values.
          MONOGATE_ROUTING: '{"exp":"EML","ln":"EXL","pow":"EXL","mul":"EDL","div":"EDL","recip":"EDL","neg":"EDL","sub":"EML","add":"EML"}'
        run: pytest -v --tb=short
